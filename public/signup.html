<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#5865f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AutoAds - Sign Up</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1 class="brand">AutoAds</h1>
      <h2>Create Account</h2>
      
      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email (Optional)</label>
          <input type="email" id="email" name="email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Sign Up</button>
      </form>
      
      <div id="errorMessage" class="error-message"></div>
      
      <p class="auth-link">
        Already have an account? <a href="/login">Login here</a>
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Clear form on page load
      document.getElementById('signupForm').reset();
      document.getElementById('errorMessage').textContent = '';
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMessage = document.getElementById('errorMessage');
      
      // Clear previous errors
      errorMessage.textContent = '';

      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match';
        errorMessage.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMessage.textContent = 'Password must be at least 6 characters';
        errorMessage.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: `username=${encodeURIComponent(username)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&confirmPassword=${encodeURIComponent(confirmPassword)}`
        });

        const data = await response.json();

        if (response.ok) {
          // Show success message
          document.getElementById('signupForm').style.display = 'none';
          errorMessage.textContent = '✓ Account created successfully! Redirecting to login...';
          errorMessage.style.display = 'block';
          errorMessage.style.borderLeftColor = 'var(--success-color)';
          errorMessage.style.color = 'var(--success-color)';
          errorMessage.style.backgroundColor = 'rgba(87, 242, 135, 0.12)';
          setTimeout(() => {
            window.location.href = data.redirect;
          }, 1500);
        } else {
          errorMessage.textContent = data.error || 'Sign up failed';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
