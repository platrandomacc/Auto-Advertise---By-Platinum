<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoAds - Management & Logs</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #bdc3c7;
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .log-table thead {
      background-color: #34495e;
      color: white;
    }

    .log-table th,
    .log-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #ecf0f1;
    }

    .log-table tbody tr:hover {
      background-color: #f5f5f5;
    }

    .log-action {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .log-action.LOGIN {
      background-color: #d5f4e6;
      color: var(--success-color);
    }

    .log-action.LOGOUT {
      background-color: #fadbd8;
      color: var(--danger-color);
    }

    .log-action.CREATE_AD {
      background-color: #d6eaf8;
      color: #3498db;
    }

    .log-action.EDIT_AD {
      background-color: #fdebd0;
      color: #f39c12;
    }

    .log-action.DELETE_AD {
      background-color: #fadbd8;
      color: var(--danger-color);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary-color);
      margin: 10px 0;
    }

    .stat-label {
      color: #666;
      font-size: 14px;
    }

    .edit-details {
      background-color: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 13px;
    }

    .edit-details p {
      margin: 5px 0;
    }

    .old-value {
      color: var(--danger-color);
      text-decoration: line-through;
    }

    .new-value {
      color: var(--success-color);
      font-weight: 600;
    }

    .filters {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filters input,
    .filters select {
      padding: 10px 15px;
      border: 1px solid #bdc3c7;
      border-radius: 5px;
      font-size: 14px;
    }

    .export-btn {
      background-color: var(--success-color);
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .export-btn:hover {
      background-color: #229954;
    }

    .timestamp {
      color: #999;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .tabs {
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 10px 15px;
        font-size: 14px;
      }

      .log-table {
        font-size: 13px;
      }

      .log-table th,
      .log-table td {
        padding: 8px 10px;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <h1 class="brand">AutoAds</h1>
      <div class="nav-links">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/management" class="nav-link active">Management</a>
        <a href="/logout" class="nav-link logout-link">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1 style="margin-bottom: 30px;">📊 Management & Logs</h1>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(event, 'activity')">Activity Logs</button>
      <button class="tab-btn" onclick="switchTab(event, 'edits')">Edit History</button>
      <button class="tab-btn" onclick="switchTab(event, 'user-activity')">User Activity</button>
    </div>

    <!-- Activity Logs Tab -->
    <div id="activity" class="tab-content active">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Activity Logs</h2>
        <button class="export-btn" onclick="exportData('activity')">Export CSV</button>
      </div>
      <table class="log-table" id="activityTable">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>User</th>
            <th>Action</th>
            <th>Description</th>
            <th>IP Address</th>
          </tr>
        </thead>
        <tbody id="activityBody"></tbody>
      </table>
    </div>

    <!-- Edit History Tab -->
    <div id="edits" class="tab-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>Edit History</h2>
        <button class="export-btn" onclick="exportData('edits')">Export CSV</button>
      </div>
      <table class="log-table" id="editsTable">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>User</th>
            <th>Ad Title</th>
            <th>Changes</th>
          </tr>
        </thead>
        <tbody id="editsBody"></tbody>
      </table>
    </div>

    <!-- User Activity Tab -->
    <div id="user-activity" class="tab-content">
      <h2>User Activity Search</h2>
      <div class="filters">
        <input type="text" id="userSearch" placeholder="Search by username...">
        <button class="btn btn-primary" onclick="searchUserActivity()">Search</button>
      </div>
      <table class="log-table" id="userActivityTable">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Action</th>
            <th>Description</th>
            <th>Ad ID</th>
          </tr>
        </thead>
        <tbody id="userActivityBody"></tbody>
      </table>
    </div>
  </div>

  <script src="/ui.js"></script>
  <script src="/ui.js"></script>
  <script>
    let currentTab = 'activity';

    function switchTab(tabName) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });

      // Remove active from all buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      // Show selected tab
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
      currentTab = tabName;

      // Load data for tab
      if (tabName === 'activity') loadActivityLogs();
      else if (tabName === 'edits') loadEditHistory();
    }

    async function loadStats() {
      try {
        const response = await fetch('/api/management/stats');
        const stats = await response.json();

        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card">
            <div class="stat-label">Total Users</div>
            <div class="stat-value">${stats.totalUsers}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Ads</div>
            <div class="stat-value">${stats.totalAds}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Edits</div>
            <div class="stat-value">${stats.totalEdits}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Your Ads</div>
            <div class="stat-value">${stats.userAds}</div>
          </div>
        `;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    function friendlyAction(action) {
      const labels = {
        LOGIN: 'User logged in',
        LOGOUT: 'User logged out',
        CREATE_AD: 'Created advertisement',
        EDIT_AD: 'Edited advertisement',
        DELETE_AD: 'Deleted advertisement',
        START_AD: 'Started ad cycle',
        STOP_AD: 'Stopped ad cycle',
        RUN_NOW: 'Sent ad immediately'
      };
      return labels[action] || action;
    }

    async function loadActivityLogs() {
      try {
        const response = await fetch('/api/management/activity-logs');
        const logs = await response.json();

        const tbody = document.getElementById('activityBody');
        tbody.innerHTML = logs.map(log => `
          <tr>
            <td class="timestamp">${new Date(log.created_at).toLocaleString()}</td>
            <td>${log.username || 'Unknown'}</td>
            <td><span class="log-action ${log.action}">${friendlyAction(log.action)}</span></td>
            <td>${log.description || ''}</td>
            <td>${log.ip_address || ''}</td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading activity logs:', error);
      }
    }

    async function loadEditHistory() {
      try {
        const response = await fetch('/api/management/ad-edits');
        const edits = await response.json();

        const tbody = document.getElementById('editsBody');
        tbody.innerHTML = edits.map(edit => `
          <tr>
            <td class="timestamp">${new Date(edit.edited_at).toLocaleString()}</td>
            <td>${edit.username}</td>
            <td>${edit.title}</td>
            <td>
              <div class="edit-details">
                ${edit.old_title && edit.new_title ? `<p>Title: <span class="old-value">${edit.old_title}</span> → <span class="new-value">${edit.new_title}</span></p>` : ''}
                ${edit.old_price || edit.new_price ? `<p>Price: <span class="old-value">$${edit.old_price || 'N/A'}</span> → <span class="new-value">$${edit.new_price || 'N/A'}</span></p>` : ''}
              </div>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error loading edit history:', error);
      }
    }

    async function searchUserActivity() {
      const username = document.getElementById('userSearch').value;
      if (!username) return;

      try {
        // First, get users to find the ID
        const response = await fetch('/api/admin/users');
        const users = await response.json();
        const user = users.find(u => u.username.toLowerCase() === username.toLowerCase());

        if (!user) {
          await showPopup({ title: 'User Not Found', message: `Could not find a user named '${username}'.`, type: 'warning' });
          return;
        }

        const logsResponse = await fetch(`/api/management/user-logs/${user.id}`);
        const logs = await logsResponse.json();

        const tbody = document.getElementById('userActivityBody');
        tbody.innerHTML = logs.map(log => `
          <tr>
            <td class="timestamp">${new Date(log.created_at).toLocaleString()}</td>
            <td><span class="log-action ${log.action}">${friendlyAction(log.action)}</span></td>
            <td>${log.description || ''}</td>
            <td>${log.ad_id || ''}</td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('Error searching user activity:', error);
        await showPopup({ title: 'Search Failed', message: 'Error searching user activity. Please try again.', type: 'danger' });
      }
    }

    function exportData(tabName) {
      let data = [];
      let filename = '';

      if (tabName === 'activity') {
        const table = document.getElementById('activityTable');
        data = Array.from(table.querySelectorAll('tbody tr')).map(row => {
          return Array.from(row.querySelectorAll('td')).map(cell => cell.textContent).join(',');
        });
        filename = 'activity-logs.csv';
      } else if (tabName === 'edits') {
        const table = document.getElementById('editsTable');
        data = Array.from(table.querySelectorAll('tbody tr')).map(row => {
          return Array.from(row.querySelectorAll('td')).map(cell => cell.textContent).join(',');
        });
        filename = 'edit-history.csv';
      }

      const csv = data.join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
    }

    // Load on page load
    loadStats();
    loadActivityLogs();
  </script>
</body>
</html>
